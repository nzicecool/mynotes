version: "3.9"

# MyNotes — self-hosted deployment with self-signed HTTPS certificate
#
# Use this when ports 80/443 are NOT forwarded to the internet.
# Caddy will generate its own CA and issue a self-signed certificate.
#
# On first visit, browsers will show a security warning.
# To trust it permanently, install the Caddy root CA on your devices:
#   docker compose -f docker-compose.selfsigned.yml exec caddy \
#     caddy trust
#
# Quick start:
#   1. Copy env-example.txt to .env and set MYNOTES_DOMAIN to your Pi's IP
#      or a nip.io address (e.g. mynotes.192.168.1.50.nip.io)
#   2. Run:  docker compose -f docker-compose.selfsigned.yml up -d
#   3. Open: https://mynotes.192.168.1.50.nip.io  (accept the cert warning)

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
    expose:
      - "3000"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "443:443/udp"   # HTTP/3
      - "80:80"
    volumes:
      - ./Caddyfile.selfsigned:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      MYNOTES_DOMAIN: ${MYNOTES_DOMAIN}
    networks:
      - internal
    depends_on:
      - app

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
