---
# MyNotes — Kubernetes Secrets
#
# ⚠️  IMPORTANT: Replace all placeholder values before applying.
#     Never commit real secrets to version control.
#
# Generate base64 values:
#   echo -n "your_value" | base64
#
# Apply with:
#   kubectl apply -f 01-secrets.yaml -n mynotes
#
# For production, consider using:
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   - External Secrets Operator (https://external-secrets.io)
#   - k3s built-in secret encryption at rest
apiVersion: v1
kind: Secret
metadata:
  name: mynotes-secrets
  namespace: mynotes
  labels:
    app.kubernetes.io/name: mynotes
type: Opaque
data:
  # echo -n "mysql://mynotes:YOUR_DB_PASS@mynotes-mysql:3306/mynotes" | base64
  DATABASE_URL: bXlzcWw6Ly9teW5vdGVzOkNIQU5HRV9NRUBteW5vdGVzLW15c3FsOjMzMDYvbXlub3Rlcw==

  # echo -n "a_long_random_secret_at_least_32_chars" | base64
  JWT_SECRET: YV9sb25nX3JhbmRvbV9zZWNyZXRfYXRfbGVhc3RfMzJfY2hhcnM=

  # AgentMail.to API key (optional — leave empty string if not using)
  # echo -n "am_your_api_key_here" | base64
  AGENTMAIL_API_KEY: ""

  # AgentMail inbox ID (optional — created automatically if not set)
  AGENTMAIL_INBOX_ID: ""

  # MySQL root password
  # echo -n "your_root_password" | base64
  MYSQL_ROOT_PASSWORD: Y0hBTkdFX01F

  # MySQL app user password (must match DATABASE_URL above)
  # echo -n "your_db_password" | base64
  MYSQL_PASSWORD: Q0hBTkdFX01F
